name: Lighthouse CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.staticDistDir=. \
            --collect.url=index.html \
            --collect.url=calculator.html \
            --collect.url=active-loans.html \
            --collect.numberOfRuns=1 \
            --assert.assertions.categories:accessibility="warn" \
            --assert.assertions.categories:best-practices="warn" \
            --assert.assertions.categories:seo="warn" \
            --assert.assertions.categories:performance="off" \
            --assert.assertions.color-contrast="warn" \
            --assert.assertions.csp-xss="off" \
            --assert.assertions.errors-in-console="warn" \
            --assert.assertions.redirects="off" \
            --assert.assertions.total-byte-weight="off" \
            --assert.assertions.unminified-javascript="off" \
            --assert.assertions.unused-javascript="off" \
            --assert.assertions.uses-responsive-images="off" \
            --assert.assertions.server-response-time="off" \
            --assert.assertions.bootup-time="off" \
            --assert.assertions.dom-size="off" \
            --assert.assertions.mainthread-work-breakdown="off" \
            --assert.assertions.first-contentful-paint="off" \
            --assert.assertions.first-meaningful-paint="off" \
            --assert.assertions.largest-contentful-paint="off" \
            --assert.assertions.max-potential-fid="off" \
            --assert.assertions.speed-index="off" \
            --assert.assertions.interactive="off" \
            --assert.assertions.render-blocking-resources="off" \
            --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
