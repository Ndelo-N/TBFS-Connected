        /**
         * Make payment on a loan
         * 
         * This is the core payment processing function that handles:
         * - Payment validation and input
         * - Payment allocation (waterfall method)
         * - Interest recalculation for early overpayments
         * - Stockvel bonus calculation
         * - State updates and transaction logging
         * 
         * Payment Allocation Order (Waterfall Method):
         * 1. Initiation Fee (monthly portion)
         * 2. Admin Fee (R60 per month, or reduced for stockvel)
         * 3. Interest (from schedule)
         * 4. Principal (remaining amount)
         * 
         * Overpayment Handling:
         * - First Half: Applied to principal (triggers interest recalculation)
         * - Second Half: Applied to fees/interest first, then principal
         * 
         * @param {number} loanId - The ID of the loan to make payment on
         */
        function makePayment(loanId) {
            // STEP 1: VALIDATION - Find and validate loan
            const loan = allLoans.find(l => l.loan_id === loanId);
            if (!loan) {
                alert('❌ Loan not found!');
                return;
            }
            
            // Only active loans can receive payments
            if (loan.status !== 'active') {
                alert('⚠️ Can only make payments on active loans!');
                return;
            }
            
            // STEP 2: CRITICAL VALIDATION - Ensure payment schedule exists
            // Payment schedules are required for accurate payment allocation
            // Without a schedule, we cannot properly allocate payments to fees, interest, and principal
            if (!loan.schedule || !Array.isArray(loan.schedule) || loan.schedule.length === 0) {
                console.warn(`⚠️ Loan #${loanId} missing schedule. Generating now...`);
                
                // Attempt to generate schedule
                loan.schedule = generateLoanSchedule(loan);
                
                // If generation failed, abort payment
                if (!loan.schedule || loan.schedule.length === 0) {
                    alert(
                        '❌ Payment Schedule Error!\n\n' +
                        `Loan #${loanId} does not have a payment schedule and could not be generated.\n\n` +
                        'Please contact support or regenerate the loan schedule.\n\n' +
                        'Payment cannot be processed without a valid schedule.'
                    );
                    return;
                }
                
                // Save state after generating schedule
                AppStateManager.save(AppState);
                dbg(`✅ Schedule generated for Loan #${loanId}`);
            }
            
            // STEP 3: INITIALIZE TRACKING FIELDS
            // These fields track payment progress and must be initialized for older loans
            if (loan.remaining_principal === undefined || loan.remaining_principal === null || isNaN(Number(loan.remaining_principal))) {
                loan.remaining_principal = loan.principal_amount || loan.principal || 0;
            }
            if (loan.initiation_fee_paid === undefined || loan.initiation_fee_paid === null || isNaN(Number(loan.initiation_fee_paid))) {
                loan.initiation_fee_paid = 0;
            }
            if (loan.interest_paid === undefined || loan.interest_paid === null || isNaN(Number(loan.interest_paid))) {
                loan.interest_paid = 0;
            }
            
            // STEP 4: CALCULATE TOTAL INITIATION FEE (if not already set)
            // Initiation fee calculation differs for stockvel vs standard loans
            if (loan.total_initiation_fee === undefined || loan.total_initiation_fee === null || isNaN(Number(loan.total_initiation_fee))) {
                const principal = loan.principal_amount || loan.principal || 0;
                if (loan.loan_type === 'stockvel' && loan.total_contributions) {
                    // Stockvel Rule: 0% initiation fee if principal <= total contributions
                    // 12% initiation fee on the excess amount above contributions
                    loan.total_initiation_fee = principal <= loan.total_contributions ? 0 : (principal - loan.total_contributions) * Calculations.RATES.INITIATION_FEE_RATE;
                } else {
                    // Standard Rule: 12% of principal
                    loan.total_initiation_fee = principal * Calculations.RATES.INITIATION_FEE_RATE;
                }
            }
            
            // STEP 5: CALCULATE TOTAL INTEREST (if not already set)
            // Total interest should come from the payment schedule for accuracy
            if (loan.total_interest === undefined || loan.total_interest === null || isNaN(Number(loan.total_interest))) {
                if (loan.schedule && loan.schedule.length > 0) {
                    // Sum interest from schedule (most accurate method)
                    loan.total_interest = loan.schedule.reduce((sum, payment) => {
                        return sum + (payment.interest_payment || 0);
                    }, 0);
                } else {
                    // Fallback: Estimate from monthly payment (less accurate)
                    // This should rarely be needed if schedules are properly generated
                    const principal = loan.principal_amount || loan.principal || 0;
                    const monthlyPayment = loan.monthly_payment || 0;
                    const totalPayments = monthlyPayment * loan.term_months;
                    const totalFees = loan.total_initiation_fee + (Calculations.RATES.ADMIN_FEE_STANDARD * loan.term_months); // Admin fees
                    loan.total_interest = Math.max(0, totalPayments - principal - totalFees);
                    console.warn(`⚠️ Loan #${loanId}: Estimated interest (schedule not available)`);
                }
            }
            
            // STEP 6: CALCULATE REMAINING AMOUNTS
            // These are displayed to the user before payment input
            const remainingInitiationFee = Math.max(0, loan.total_initiation_fee - loan.initiation_fee_paid);
            const remainingInterest = Math.max(0, loan.total_interest - loan.interest_paid);
            
            // STEP 7: CALCULATE LATE PENALTY (if applicable)
            // Late penalties only apply to loans distributed after 31 January 2026
            const gracePeriodDays = AppState.gracePeriodDays || 3;
            let nextDueDate = Calculations.getLoanPaymentDueDate(loan, loan.payments_made || 0);
            const initialPendingPayment = (loan.schedule || []).find(p => p.status === 'pending');
            if ((!nextDueDate || isNaN(new Date(nextDueDate).getTime())) && initialPendingPayment?.due_date) {
                const scheduleDue = new Date(initialPendingPayment.due_date);
                if (!isNaN(scheduleDue.getTime())) nextDueDate = scheduleDue;
            }
            let latePenalty = 0;
            let daysLate = 0;
            let isPaymentLate = false;
            
            if (nextDueDate && Calculations.isLateFeesEligible(loan)) {
                const graceCutoff = new Date(nextDueDate);
                graceCutoff.setDate(graceCutoff.getDate() + gracePeriodDays);
                const todayDate = new Date();
                
                if (todayDate > graceCutoff) {
                    daysLate = Math.floor((todayDate - nextDueDate) / (1000 * 60 * 60 * 24));
                    latePenalty = Calculations.calculateLatePenalty(daysLate - gracePeriodDays, loan.remaining_principal);
                    isPaymentLate = true;
                }
            }
            
            // STEP 7b: GET PAYMENT AMOUNT FROM USER
            // Display loan details and prompt for payment amount
            const expectedPayment = loan.monthly_payment || 0;
            const remainingPrincipal = loan.remaining_principal;
            const paymentsRemaining = loan.term_months - (loan.payments_made || 0);
            
            // F-13: a structured in-page form replaces the prompt() flow.
            // The confirmed input arrives via processPayment().
            openPaymentModal({
                loanId, loan,
                expectedPayment, remainingPrincipal, remainingInterest,
                remainingInitiationFee, latePenalty, daysLate, isPaymentLate,
                gracePeriodDays, nextDueDate,
                paymentsMade: loan.payments_made || 0
            });
        }

        /* ==========================================================
         * F-13: Payment modal — state, preview, and confirmation
         * ========================================================== */
        let paymentModalCtx = null;

        /** Effective (still-owed) dues on a schedule entry, net of any
         *  partial payments already recorded against it. */
        function getEntryEffectiveDues(entry) {
            const paid = (entry && entry.paid_breakdown) || {};
            const eff = (due, done) => Math.max(0, (Number(due) || 0) - (Number(done) || 0));
            return {
                initiation_fee: eff(entry.initiation_fee, paid.initiation),
                admin_fee: eff(entry.admin_fee, paid.admin),
                interest_payment: eff(entry.interest_payment, paid.interest),
                principal_payment: eff(entry.principal_payment, paid.principal)
            };
        }

        function interestCapRemainingFor(loan) {
            return Number.isFinite(loan.max_interest_allowed)
                ? Math.max(0, loan.max_interest_allowed - (loan.interest_paid || 0))
                : Infinity;
        }

        function openPaymentModal(ctx) {
            paymentModalCtx = ctx;
            const loan = ctx.loan;
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('pmTitle').textContent = 'Payment — Loan #' + loan.loan_id;
            document.getElementById('pmClient').textContent = loan.client_name || '';
            document.getElementById('pmSummary').innerHTML =
                '<div class="info-row"><span>Expected monthly:</span><strong>' + esc(Calculations.formatCurrency(ctx.expectedPayment)) + '</strong></div>' +
                '<div class="info-row"><span>Remaining principal:</span><strong>' + esc(Calculations.formatCurrency(ctx.remainingPrincipal)) + '</strong></div>' +
                '<div class="info-row"><span>Remaining interest:</span><strong>' + esc(Calculations.formatCurrency(ctx.remainingInterest)) + '</strong></div>' +
                '<div class="info-row"><span>Remaining initiation fee:</span><strong>' + esc(Calculations.formatCurrency(ctx.remainingInitiationFee)) + '</strong></div>' +
                (ctx.latePenalty > 0
                    ? '<div class="info-row"><span>\u26A0\uFE0F Late penalty (' + esc(ctx.daysLate) + ' days late, ' + esc(ctx.gracePeriodDays) + '-day grace):</span><strong>' + esc(Calculations.formatCurrency(ctx.latePenalty)) + '</strong></div>'
                    : '') +
                '<div class="info-row"><span>Payments made:</span><strong>' + esc(ctx.paymentsMade) + '/' + esc(loan.term_months) + '</strong></div>';
            const amountInput = document.getElementById('pmAmount');
            amountInput.value = ctx.expectedPayment ? Number(ctx.expectedPayment).toFixed(2) : '';
            document.getElementById('pmDate').value = today;
            document.getElementById('pmError').textContent = '';
            updatePaymentPreview();
            document.getElementById('paymentModal').style.display = 'flex';
            amountInput.focus();
            amountInput.select();
        }

        function closePaymentModal() {
            paymentModalCtx = null;
            document.getElementById('paymentModal').style.display = 'none';
        }

        function updatePaymentPreview() {
            if (!paymentModalCtx) return;
            const loan = paymentModalCtx.loan;
            const amount = parseFloat(document.getElementById('pmAmount').value);
            const preview = document.getElementById('pmPreview');
            if (!amount || isNaN(amount) || amount <= 0) {
                preview.innerHTML = '<em>Enter an amount to preview the allocation.</em>';
                return;
            }
            const entry = loan.schedule && loan.schedule.find(p => p.status === 'pending' || p.status === 'partial');
            if (!entry) {
                preview.innerHTML = '<em>No pending installment on the schedule.</em>';
                return;
            }
            const alloc = Calculations.allocateScheduledPayment(amount, {
                entry: getEntryEffectiveDues(entry),
                latePenaltyDue: paymentModalCtx.latePenalty,
                interestCapRemaining: interestCapRemainingFor(loan),
                remainingPrincipal: loan.remaining_principal
            });
            const line = (label, v) => v > 0
                ? '<div class="info-row"><span>' + label + ':</span><strong>' + esc(Calculations.formatCurrency(v)) + '</strong></div>'
                : '';
            preview.innerHTML =
                line('Initiation fee', alloc.initiationPaid) +
                line('Admin fee', alloc.adminPaid) +
                line('Late penalty', alloc.penaltyPaid) +
                line('Interest', alloc.interestPaid) +
                line('Principal', alloc.principalPaid) +
                (alloc.unallocated > 0
                    ? '<div class="info-row"><span>Extra (overpayment):</span><strong>' + esc(Calculations.formatCurrency(alloc.unallocated)) + '</strong></div>'
                    : '') +
                '<div class="info-row" style="border-top:1px solid #dfe6ee;margin-top:6px;padding-top:6px;"><span>Total:</span><strong>' + esc(Calculations.formatCurrency(amount)) + '</strong></div>';
        }

        function confirmPaymentModal() {
            if (!paymentModalCtx) return;
            const errEl = document.getElementById('pmError');
            const amount = parseFloat(document.getElementById('pmAmount').value);
            if (!amount || isNaN(amount) || amount <= 0) {
                errEl.textContent = '\u274C Enter a valid payment amount.';
                return;
            }
            const dateVal = document.getElementById('pmDate').value;
            if (!dateVal) {
                errEl.textContent = '\u274C Choose a payment date.';
                return;
            }
            const ctx = paymentModalCtx;
            closePaymentModal();
            processPayment(ctx, amount, dateVal);
        }

        /**
         * Apply a confirmed payment — the original makePayment flow from the
         * point where user input has been collected. (F-13)
         */
        function processPayment(ctx, amount, paymentDateInput) {
            const loan = ctx.loan;
            const loanId = ctx.loanId;
            let nextDueDate = ctx.nextDueDate;
            const latePenalty = ctx.latePenalty;
            const daysLate = ctx.daysLate;
            const gracePeriodDays = ctx.gracePeriodDays;
            const expectedPayment = ctx.expectedPayment;

            // Parse payment date (input[type=date] supplies YYYY-MM-DD);
            // local midday avoids timezone date-shift edge cases.
            let paymentDate;
            try {
                paymentDate = new Date(paymentDateInput + 'T12:00:00');
                if (isNaN(paymentDate.getTime())) throw new Error('Invalid date');
                paymentDate = paymentDate.toISOString();
            } catch (error) {
                alert('\u274C Invalid payment date!');
                return;
            }

            // STEP 9: PAYMENT ALLOCATION (WATERFALL METHOD)
            // Initialize allocation variables
            let remainingAmount = amount;
            let principalPaid = 0;
            let interestPaid = 0;
            let adminFeePaid = 0;
            let initiationFeePaid = 0;
            let latePenaltyPaid = 0;
            
            // Track principal before payment for interest recalculation check
            const principalBeforePayment = loan.remaining_principal;
            
            // STEP 10: GET NEXT PENDING PAYMENT FROM SCHEDULE
            // The schedule contains the expected payment breakdown for each month
            // We find the next unpaid payment to allocate against
            let nextPayment = loan.schedule.find(p => p.status === 'pending' || p.status === 'partial');
            
            // VALIDATION: Ensure we have a valid next payment
            if (!nextPayment) {
                // Check if all payments are marked as paid
                const allPaid = loan.schedule.every(p => p.status === 'paid');
                if (allPaid && loan.remaining_principal <= 0.01) {
                    alert('✅ This loan is already fully paid!');
                    return;
                } else {
                    // Schedule exists but no pending payment found - regenerate schedule
                    console.warn(`⚠️ No pending payment found in schedule for Loan #${loanId}. Regenerating...`);
                    loan.schedule = generateLoanSchedule(loan);
                    nextPayment = loan.schedule.find(p => p.status === 'pending' || p.status === 'partial');
                    if (!nextPayment) {
                        alert('❌ Error: Could not find next payment in schedule. Please contact support.');
                        return;
                    }
                    // Continue with regenerated schedule
                }
            }

            // Fallback: if calculated due date is unavailable, use schedule due date
            if ((!nextDueDate || isNaN(new Date(nextDueDate).getTime())) && nextPayment?.due_date) {
                const scheduleDue = new Date(nextPayment.due_date);
                if (!isNaN(scheduleDue.getTime())) {
                    nextDueDate = scheduleDue;
                }
            }
            
            // STEP 11: ALLOCATE VIA THE SHARED WATERFALL (F-02/F-16)
            // initiation → admin → late penalty → interest → principal,
            // interest clamped to max_interest_allowed, all against the
            // entry's EFFECTIVE dues (net of prior partial payments).
            const alloc = Calculations.allocateScheduledPayment(remainingAmount, {
                entry: getEntryEffectiveDues(nextPayment),
                latePenaltyDue: latePenalty,
                interestCapRemaining: interestCapRemainingFor(loan),
                remainingPrincipal: loan.remaining_principal
            });
            initiationFeePaid = alloc.initiationPaid;
            adminFeePaid = alloc.adminPaid;
            latePenaltyPaid = alloc.penaltyPaid;
            interestPaid = alloc.interestPaid;
            principalPaid = alloc.principalPaid;
            remainingAmount = alloc.unallocated;

            // STEP 12: HANDLE OVERPAYMENT
            // Overpayments are handled differently depending on when they occur in the loan term
            // This rewards early overpayments with interest recalculation
            if (remainingAmount > 0 && loan.remaining_principal > principalPaid) {
                // Calculate which payment number we're on
                const halfwayPoint = Math.ceil(loan.term_months / 2);
                const basePrincipal = loan.original_principal || loan.principal_amount || loan.principal || 0;
                const principalPerMonth = basePrincipal / Math.max(1, loan.term_months || 1);
                const principalAlreadySettled = Math.max(0, basePrincipal - (loan.remaining_principal || 0));
                const currentPaymentNumber = Math.floor(principalAlreadySettled / Math.max(0.01, principalPerMonth)) + 1;
                
                if (currentPaymentNumber <= halfwayPoint) {
                    // FIRST HALF OVERPAYMENT: Apply extra to principal
                    // This triggers interest recalculation, rewarding early overpayments
                    const additionalPrincipal = Math.min(remainingAmount, loan.remaining_principal - principalPaid);
                    principalPaid += additionalPrincipal;
                    remainingAmount -= additionalPrincipal;
                    
                    dbg(`💡 Overpayment in first half (month ${currentPaymentNumber}/${halfwayPoint})`);
                    dbg(`Extra principal paid: R${additionalPrincipal.toFixed(2)}`);
                    dbg(`Interest will be recalculated on reduced balance`);
                } else {
                    // SECOND HALF OVERPAYMENT: Apply to fees/interest first, then principal
                    // In the second half, we prioritize paying off fees and interest before principal
                    dbg(`📊 Overpayment in second half (month ${currentPaymentNumber}/${halfwayPoint})`);
                    
                    // Apply to remaining initiation fee balance first
                    const remainingInitiationFee = Math.max(0, (loan.total_initiation_fee || 0) - (loan.initiation_fee_paid || 0));
                    if (remainingAmount > 0 && remainingInitiationFee > 0) {
                        const extraInitiation = Math.min(remainingAmount, remainingInitiationFee);
                        initiationFeePaid += extraInitiation;
                        remainingAmount -= extraInitiation;
                        dbg(`Applied R${extraInitiation.toFixed(2)} to initiation fee balance`);
                    }
                    
                    // Apply to remaining interest balance (never beyond the
                    // loan's interest cap — F-02)
                    const capLeft = Math.max(0, interestCapRemainingFor(loan) - interestPaid);
                    const remainingInterest = Math.min(
                        Math.max(0, (loan.total_interest || 0) - (loan.interest_paid || 0)), capLeft);
                    if (remainingAmount > 0 && remainingInterest > 0) {
                        const extraInterest = Math.min(remainingAmount, remainingInterest);
                        interestPaid += extraInterest;
                        remainingAmount -= extraInterest;
                        dbg(`Applied R${extraInterest.toFixed(2)} to interest balance`);
                    }
                    
                    // Finally apply to principal
                    if (remainingAmount > 0) {
                        const additionalPrincipal = Math.min(remainingAmount, loan.remaining_principal - principalPaid);
                        principalPaid += additionalPrincipal;
                        remainingAmount -= additionalPrincipal;
                        dbg(`Applied R${additionalPrincipal.toFixed(2)} to principal`);
                    }
                }
            }
            
            // STEP 13: UPDATE PAYMENT SCHEDULE ENTRY
            // Record what this payment covered on the entry; mark it 'paid'
            // only once its dues are fully met — a partial payment no longer
            // silently consumes a whole installment. (F-02 fold-in)
            const pb = nextPayment.paid_breakdown = nextPayment.paid_breakdown || {};
            pb.initiation = Calculations.round((pb.initiation || 0) + initiationFeePaid);
            pb.admin = Calculations.round((pb.admin || 0) + adminFeePaid);
            pb.interest = Calculations.round((pb.interest || 0) + interestPaid);
            pb.principal = Calculations.round((pb.principal || 0) + principalPaid);
            nextPayment.payment_date = paymentDate;
            nextPayment.amount_paid = Calculations.round((nextPayment.amount_paid || 0) + amount);
            const duesLeft = getEntryEffectiveDues(nextPayment);
            // Interest owed on the entry is only claimable up to the cap.
            const claimableInterestLeft = Math.min(duesLeft.interest_payment, interestCapRemainingFor(loan));
            const entryCovered = (duesLeft.initiation_fee + duesLeft.admin_fee +
                claimableInterestLeft + duesLeft.principal_payment) <= 0.01;
            nextPayment.status = entryCovered ? 'paid' : 'partial';
            nextPayment.partial_payment = !entryCovered;

            // Track total principal received (not just this payment)
            if (!loan.total_principal_received) {
                loan.total_principal_received = 0;
            }
            loan.total_principal_received += principalPaid;
            
            // Initialize payment history if not exists
            if (!loan.payment_history) {
                loan.payment_history = [];
            }
            
            // Determine payment status
            const paymentStatus = nextDueDate 
                ? Calculations.getPaymentStatus(paymentDate, nextDueDate, amount, expectedPayment, gracePeriodDays)
                : 'on-time';
            
            // Add this payment to history
            loan.payment_history.push({
                date: paymentDate,
                amount: amount,
                principal: principalPaid,
                interest: interestPaid,
                admin_fee: adminFeePaid,
                initiation_fee: initiationFeePaid,
                late_penalty: latePenaltyPaid,
                payment_status: paymentStatus,
                due_date: nextDueDate && !isNaN(new Date(nextDueDate).getTime())
                    ? new Date(nextDueDate).toISOString()
                    : null,
                days_late: daysLate,
                payments_made_after: 0, // Will be updated below
                remaining_principal_after: 0, // Will be updated below
                interest_recalculated: false // Will be updated if recalc happens
            });
            
            // Update loan totals
            loan.remaining_principal = Math.max(0, loan.remaining_principal - principalPaid);
            loan.initiation_fee_paid = (loan.initiation_fee_paid || 0) + initiationFeePaid;
            loan.interest_paid = (loan.interest_paid || 0) + interestPaid;
            
            // STEP 16: CALCULATE PAYMENTS MADE
            // Payments are calculated based on principal received, not payment count
            // This handles partial payments and overpayments correctly
            // Example: If principal per month is R1,000 and R1,500 was received, that's 1.5 payments
            const basePrincipalForProgress = loan.original_principal || loan.principal_amount || loan.principal || 0;
            const principalPerMonth = basePrincipalForProgress / Math.max(1, loan.term_months || 1);
            const calculatedPayments = Math.floor((loan.total_principal_received || 0) / Math.max(0.01, principalPerMonth));
            loan.payments_made = Math.min(loan.term_months || calculatedPayments, Math.max(0, calculatedPayments));
            
            // STEP 17: UPDATE PAYMENT HISTORY ENTRY
            // Record the payment in the loan's payment history for audit trail
            // This provides a complete record of all transactions on the loan
            const lastPayment = loan.payment_history[loan.payment_history.length - 1];
            if (lastPayment) {
                lastPayment.payments_made_after = loan.payments_made;
                lastPayment.remaining_principal_after = loan.remaining_principal;
            }
            
            // Log principal tracking for debugging and verification
            dbg(`💰 Principal Tracking:`);
            dbg(`Total Principal Received: R${loan.total_principal_received.toFixed(2)}`);
            dbg(`Principal Per Month: R${principalPerMonth.toFixed(2)}`);
            dbg(`Payments Made (calculated): ${loan.payments_made}/${loan.term_months}`);
            
            // Check for interest recalculation (if overpayment in first half)
            const halfwayPoint = Math.ceil(loan.term_months / 2);
            const interestPeriod = loan.interest_calculation_months || Calculations.calculateInterestPeriod(loan.term_months).interestMonths;
            
            if (loan.payments_made <= halfwayPoint && principalPaid > principalPerMonth * 1.1) {
                // Significant overpayment in first half - recalculate interest
                dbg(`\n🔄 RECALCULATING INTEREST (Overpayment in first half)`);
                dbg(`Previous Principal: R${principalBeforePayment.toFixed(2)}`);
                dbg(`New Principal: R${loan.remaining_principal.toFixed(2)}`);
                
                try {
                    // Recalculate interest on new reduced principal
                    const isStockvel = loan.loan_type === 'stockvel' || loan.isStockvelLoan;
                    let newInterestCalculation = 0;
                    
                    if (isStockvel && loan.total_contributions) {
                        // Stockvel: Use tiered rates on new balance
                        let balance = loan.remaining_principal;
                        let currentSavings = loan.total_contributions + ((loan.monthly_contribution || 0) * loan.payments_made);
                        const remainingMonths = interestPeriod - loan.payments_made;
                        
                        for (let i = 0; i < remainingMonths; i++) {
                            const tieredResult = Calculations.calculateTieredStockvelInterest(balance, currentSavings);
                            const minimumInterest = balance * Calculations.RATES.STOCKVEL_MIN_MONTHLY_RATE;
                            const monthInterest = Math.max(tieredResult.tiers1to4Interest, minimumInterest);
                            newInterestCalculation += monthInterest;
                            balance -= principalPerMonth;
                            currentSavings += (loan.monthly_contribution || 0);
                        }
                    } else {
                        // Standard: Use 30% income table on new balance
                        let balance = loan.remaining_principal;
                        const remainingMonths = interestPeriod - loan.payments_made;
                        
                        for (let i = 0; i < remainingMonths; i++) {
                            const tbfsIncome = balance * Calculations.RATES.INCOME_TABLE_RATE;
                            const adminFee = Calculations.RATES.ADMIN_FEE_STANDARD;
                            const initiationFee = (loan.total_initiation_fee || 0) / loan.term_months;
                            const monthInterest = tbfsIncome - adminFee - initiationFee;
                            newInterestCalculation += monthInterest;
                            balance -= principalPerMonth;
                        }
                    }
                    
                    // Update interest tracking
                    const previousMaxInterest = loan.max_interest_allowed || 0;
                    const newMaxInterest = loan.interest_paid + newInterestCalculation;
                    loan.max_interest_allowed = newMaxInterest;
                    loan.expected_monthly_interest = newMaxInterest / loan.term_months;

                    // Propagate the recalculated interest into the remaining
                    // schedule entries so future allocations and displays use
                    // the reduced figures. (F-02 fold-in)
                    const openEntries = loan.schedule.filter(p => p.status !== 'paid');
                    if (openEntries.length > 0) {
                        const perEntry = Calculations.round(newInterestCalculation / openEntries.length);
                        openEntries.forEach(p => {
                            p.interest_payment = perEntry;
                            p.monthly_payment = Calculations.round(
                                (p.principal_payment || 0) + (p.admin_fee || 0) +
                                (p.initiation_fee || 0) + perEntry);
                        });
                        loan.monthly_payment = openEntries[0].monthly_payment;
                    }
                    
                    dbg(`Previous Max Interest: R${previousMaxInterest.toFixed(2)}`);
                    dbg(`New Max Interest: R${newMaxInterest.toFixed(2)}`);
                    dbg(`Interest Reduction: R${(previousMaxInterest - newMaxInterest).toFixed(2)}`);
                    dbg(`✅ Interest recalculated successfully!`);
                    
                    // Flag for display
                    loan.interest_recalculated = true;
                    loan.last_recalculation_date = paymentDate;
                    
                    // Update payment history entry
                    const lastPayment = loan.payment_history[loan.payment_history.length - 1];
                    lastPayment.interest_recalculated = true;
                    lastPayment.new_max_interest = newMaxInterest;
                    
                } catch (error) {
                    console.error('Error recalculating interest:', error);
                }
            }
            
            // STEP 20: UPDATE LEGACY FIELDS FOR BACKWARD COMPATIBILITY
            // Some older code may reference total_interest_charged instead of interest_paid
            // Keep both fields in sync to prevent data inconsistencies
            loan.total_interest_charged = loan.interest_paid;
            
            // STEP 21: CHECK IF LOAN IS FULLY PAID OFF
            // A loan is considered complete when:
            // - Remaining principal is <= R0.01 (essentially zero)
            // - OR payments_made >= term_months (all scheduled payments completed)
            if (loan.remaining_principal <= 0.01 || loan.payments_made >= loan.term_months) {
                loan.status = 'completed';
                loan.completion_date = new Date().toISOString();
                loan.remaining_principal = 0; // Ensure it's exactly zero
                
                // Mark all remaining schedule entries as paid
                loan.schedule.forEach(payment => {
                    if (payment.status === 'pending' || payment.status === 'partial') {
                        payment.status = 'paid';
                    }
                });
            }
            
            // STEP 22: CALCULATE AND RECORD BONUS FOR STOCKVEL MEMBERS
            // Stockvel members earn bonuses when they pay less than the 10% minimum charge
            // Bonus = 10% minimum - actual amount due
            // This rewards members with good savings-to-loan ratios
            let bonusEarned = 0;
            if (loan.memberNumber && AppState.stockvelMembers) {
                // Find the stockvel member using standardized lookup
                const stockvelMember = Calculations.findStockvelMember(
                    { memberNumber: loan.memberNumber }, 
                    AppState.stockvelMembers
                );
                
                if (stockvelMember) {
                    // Calculate what TBFS is due (tiered interest + fees)
                    // Use balance BEFORE this payment for calculation
                    const remainingBalance = loan.remaining_principal + principalPaid;
                    
                    // Amount due to TBFS = interest + admin fee + initiation fee
                    const amountDueToTBFS = interestPaid + adminFeePaid + initiationFeePaid;
                    
                    // 10% minimum charge rule: Member must pay at least 10% of balance
                    const minimumCharge = remainingBalance * Calculations.RATES.STOCKVEL_MIN_MONTHLY_RATE;
                    
                    // Bonus is earned when actual amount due is less than minimum charge
                    if (amountDueToTBFS < minimumCharge) {
                        // Member pays EXACTLY 10% (minimum)
                        // Bonus = difference between minimum and actual amount due
                        bonusEarned = minimumCharge - amountDueToTBFS;
                        
                        // Add bonus to member's accumulated bonus (NOT to contributions!)
                        // This keeps contributions pure and bonuses separate
                        stockvelMember.accumulatedBonus = (stockvelMember.accumulatedBonus || 0) + bonusEarned;
                        
                        // Ensure stockvelReceipts array exists
                        if (!AppState.stockvelReceipts) AppState.stockvelReceipts = [];
                        
                        // Record bonus receipt for audit trail
                        AppState.stockvelReceipts.push({
                            id: Date.now(),
                            memberNumber: stockvelMember.memberNumber,
                            memberName: stockvelMember.name,
                            type: 'loan_payment',
                            amount: amount,
                            date: paymentDate,
                            notes: `Loan #${loanId} payment - Bonus earned (paid 10% minimum, saved ${((bonusEarned/minimumCharge)*100).toFixed(1)}%)`,
                            previousTotal: stockvelMember.totalContributions,
                            newTotal: stockvelMember.totalContributions, // Contributions stay same!
                            bonusAmount: bonusEarned,
                            previousBonus: stockvelMember.accumulatedBonus - bonusEarned
                        });
                        
                        dbg(`🎁 Stockvel Bonus Earned: R${bonusEarned.toFixed(2)}`);
                    }
                    // else: amountDueToTBFS >= minimumCharge
                    // Member pays tiered amount (already > 10%), no bonus earned
                }
            }
            
            // STEP 23: UPDATE APPSTATE (GLOBAL FINANCIAL TRACKING)
            // Update system-wide financial metrics
            // Capital: All money received goes to capital
            AppState.capital = (AppState.capital || 0) + amount;
            
            // Deployed: Reduce by principal paid (money is no longer loaned out)
            AppState.deployed = Math.max(0, (AppState.deployed || 0) - principalPaid);
            
            // Total Interest Earned: Track cumulative interest income
            AppState.totalInterestEarned = (AppState.totalInterestEarned || 0) + interestPaid;
            
            // Total Fees Earned: Track cumulative fee income (admin + initiation)
            AppState.totalFeesEarned = (AppState.totalFeesEarned || 0) + adminFeePaid + initiationFeePaid;

            // Penalty income is neither interest nor fees — track it. (F-06)
            AppState.totalPenaltiesEarned = (AppState.totalPenaltiesEarned || 0) + latePenaltyPaid;
            
            // STEP 24: LOG TRANSACTION FOR AUDIT TRAIL
            // Transaction history provides a complete record of all financial activity
            // This is used for reporting, reconciliation, and debugging
            if (!AppState.transactions) AppState.transactions = [];
            AppState.transactions.push({
                id: Date.now(),
                type: 'payment',
                description: 'Payment \u2014 ' + loan.client_name + ' (Loan #' + loanId + ')',
                timestamp: new Date().toISOString(),
                paymentDate: paymentDate,
                details: {
                    loanId: loanId,
                    clientName: loan.client_name,
                    paymentAmount: amount,
                    principalPaid: principalPaid,
                    interestPaid: interestPaid,
                    adminFeePaid: adminFeePaid,
                    initiationFeePaid: initiationFeePaid,
                    latePenaltyPaid: latePenaltyPaid,
                    paymentStatus: paymentStatus,
                    daysLate: daysLate,
                    overpayment: remainingAmount,
                    remainingPrincipal: loan.remaining_principal,
                    remainingInterest: Math.max(0, loan.total_interest - loan.interest_paid),
                    remainingInitiationFee: Math.max(0, loan.total_initiation_fee - loan.initiation_fee_paid),
                    paymentNumber: loan.payments_made,
                    totalPrincipalReceived: loan.total_principal_received,
                    interestRecalculated: loan.interest_recalculated || false,
                    newMaxInterest: loan.interest_recalculated ? loan.max_interest_allowed : null
                }
            });
            
            // STEP 25: SAVE STATE TO PERSISTENCE
            // Save all changes to localStorage for persistence
            // This also triggers cross-tab synchronization via AppStateManager
            AppStateManager.save(AppState);
            
            // Calculate remaining amounts for display
            const newRemainingInitiationFee = Math.max(0, loan.total_initiation_fee - loan.initiation_fee_paid);
            const newRemainingInterest = Math.max(0, loan.total_interest - loan.interest_paid);
            
            // Show success message
            const completionMsg = loan.status === 'completed' ? '\n\n🎉 LOAN FULLY PAID!' : '';
            const overpaymentMsg = remainingAmount > 0.01 ? `\n💡 Overpayment: ${Calculations.formatCurrency(remainingAmount)} (credited to account)` : '';
            const partialMsg = nextPayment && nextPayment.partial_payment ? '\n⚠️ Partial payment recorded - installment not yet complete' : '';
            const recalcMsg = loan.interest_recalculated ? `\n\n🔄 INTEREST RECALCULATED!\nYour overpayment in the first half reduced future interest.\nNew Max Interest: ${Calculations.formatCurrency(loan.max_interest_allowed)}` : '';
            const penaltyMsg = latePenaltyPaid > 0 ? `\n• Late Penalty: ${Calculations.formatCurrency(latePenaltyPaid)} (${daysLate} days late)` : '';
            const statusMsg = paymentStatus !== 'on-time' ? `\n📋 Status: ${paymentStatus.toUpperCase()}` : '';
            
            // Stockvel bonus message
            let bonusMsg = '';
            if (bonusEarned > 0 && loan.memberNumber && AppState.stockvelMembers) {
                const stockvelMember = AppState.stockvelMembers.find(m => m.memberNumber === loan.memberNumber);
                if (stockvelMember) {
                    bonusMsg = `\n\n🎁 Stockvel Member Bonus:\n` +
                              `🎁 Bonus Earned: ${Calculations.formatCurrency(bonusEarned)}\n` +
                              `• Total Accumulated: ${Calculations.formatCurrency(stockvelMember.accumulatedBonus)}`;
                }
            }
            
            // Format payment date for display
            const paymentDateFormatted = new Date(paymentDate).toLocaleDateString('en-ZA', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            
            alert(
                `✅ Payment Processed Successfully!${completionMsg}${partialMsg}${statusMsg}${recalcMsg}${bonusMsg}\n\n` +
                `📅 Payment Date: ${paymentDateFormatted}\n` +
                `💰 Total Paid: ${Calculations.formatCurrency(amount)}\n\n` +
                `📊 Payment Breakdown:\n` +
                `• Principal: ${Calculations.formatCurrency(principalPaid)}\n` +
                `• Interest: ${Calculations.formatCurrency(interestPaid)}\n` +
                `• Admin Fee: ${Calculations.formatCurrency(adminFeePaid)}\n` +
                `• Initiation Fee: ${Calculations.formatCurrency(initiationFeePaid)}${penaltyMsg}${overpaymentMsg}\n\n` +
                `📈 Progress:\n` +
                `• Payments Made: ${loan.payments_made}/${loan.term_months}\n` +
                `• Total Principal Received: ${Calculations.formatCurrency(loan.total_principal_received)}\n\n` +
                `💵 Remaining Balances:\n` +
                `• Principal: ${Calculations.formatCurrency(loan.remaining_principal)}\n` +
                `• Interest: ${Calculations.formatCurrency(newRemainingInterest)}\n` +
                `• Initiation Fee: ${Calculations.formatCurrency(newRemainingInitiationFee)}`
            );
            
            // Reload loans
            loadLoans();
        }

        /**
         * ============================================
         * LOAN ADJUSTMENT AUDIT TRAIL HELPERS
         * ============================================
         *
         * Adjustments mutate core loan terms (principal/term/interest/payment).
         * To keep statements transparent, we record a before/after snapshot and a diff.
         * The statement PDF (and View Details text statement) can then render those changes.
         */
        function normalizeMoney(value) {
            const num = Number(value);
            if (!isFinite(num)) return 0;
            return Calculations.round(num);
        }

        function formatLocalDateYMD(value) {
            if (!value) return null;
            const d = (value instanceof Date) ? value : new Date(value);
            if (isNaN(d.getTime())) return null;
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function getNextPendingScheduleEntry(loan) {
            const schedule = Array.isArray(loan.schedule) ? loan.schedule : [];
            return schedule.find(p => p && (p.status === 'pending' || p.status === 'partial')) || null;
        }

        function snapshotLoanAdjustmentState(loan) {
            const principalAmount = (loan.principal_amount ?? loan.principal ?? 0);
            const originalPrincipal = (loan.original_principal ?? principalAmount);
            const nextPending = getNextPendingScheduleEntry(loan);

            return {
                principal_amount: normalizeMoney(principalAmount),
                original_principal: normalizeMoney(originalPrincipal),
                remaining_principal: normalizeMoney(loan.remaining_principal || 0),
                term_months: Number(loan.term_months || loan.term || 0),
                monthly_payment: normalizeMoney(loan.monthly_payment || 0),
                total_interest: normalizeMoney(loan.total_interest || 0),
                total_initiation_fee: normalizeMoney(loan.total_initiation_fee || 0),
                interest_calculation_months: Number(loan.interest_calculation_months || 0),
                max_interest_allowed: normalizeMoney(loan.max_interest_allowed || 0),
                expected_monthly_interest: normalizeMoney(loan.expected_monthly_interest || 0),
                payments_made: Number(loan.payments_made || 0),
                schedule_length: Array.isArray(loan.schedule) ? loan.schedule.length : 0,
                next_due_date: formatLocalDateYMD(nextPending ? nextPending.due_date : null)
            };
        }

        function diffLoanAdjustmentSnapshots(before, after) {
            const fields = [
                { key: 'principal_amount', label: 'Principal', format: 'currency' },
                { key: 'original_principal', label: 'Original Principal', format: 'currency' },
                { key: 'remaining_principal', label: 'Remaining Principal', format: 'currency' },
                { key: 'term_months', label: 'Term (months)', format: 'number' },
                { key: 'monthly_payment', label: 'Monthly Payment', format: 'currency' },
                { key: 'total_interest', label: 'Total Interest', format: 'currency' },
                { key: 'total_initiation_fee', label: 'Total Initiation Fee', format: 'currency' },
                { key: 'interest_calculation_months', label: 'Interest Period (months)', format: 'number' },
                { key: 'max_interest_allowed', label: 'Max Interest Allowed', format: 'currency' },
                { key: 'expected_monthly_interest', label: 'Expected Monthly Interest', format: 'currency' },
                { key: 'schedule_length', label: 'Schedule Length', format: 'number' },
                { key: 'next_due_date', label: 'Next Due Date', format: 'date' }
            ];

            const changes = [];
            fields.forEach(f => {
                const b = before ? before[f.key] : undefined;
                const a = after ? after[f.key] : undefined;

                let same = false;
                if (f.format === 'currency') {
                    same = Math.abs((Number(b) || 0) - (Number(a) || 0)) < 0.01;
                } else {
                    same = (b === a);
                }

                if (!same) {
                    changes.push({ key: f.key, label: f.label, format: f.format, before: b, after: a });
                }
            });

            return changes;
        }

        function humanizeAdjustmentType(adjustmentType) {
            switch (adjustmentType) {
                case 'change_repayment_period':
                    return 'Change repayment period';
                case 'add_amount':
                    return 'Add amount to loan';
                default:
                    return adjustmentType ? String(adjustmentType).replace(/_/g, ' ') : 'Loan adjustment';
            }
        }

        function formatAdjustmentValue(format, value, style) {
            if (value === null || value === undefined || value === '') return 'N/A';
            if (format === 'currency') return Calculations.formatCurrency(Number(value) || 0);
            if (format === 'date') return String(value);
            return String(value);
        }

        function formatAdjustmentChangeLine(change, style) {
            const before = formatAdjustmentValue(change.format, change.before, style);
            const after = formatAdjustmentValue(change.format, change.after, style);
            const arrow = style === 'pdf' ? '->' : '→';
            const prefix = style === 'pdf' ? '- ' : '• ';
            return `${prefix}${change.label}: ${before} ${arrow} ${after}`;
        }

        function buildChangesFromLegacyAdjustmentDetails(details) {
            const changes = [];
            if (!details || typeof details !== 'object') return changes;

            if (details.adjustmentType === 'change_repayment_period') {
                if (details.oldTerm !== undefined && details.newTerm !== undefined) {
                    changes.push({ label: 'Term (months)', format: 'number', before: details.oldTerm, after: details.newTerm });
                }
                if (details.oldMonthlyPayment !== undefined && details.newMonthlyPayment !== undefined) {
                    changes.push({ label: 'Monthly Payment', format: 'currency', before: details.oldMonthlyPayment, after: details.newMonthlyPayment });
                }
                if (details.oldTotalInterest !== undefined && details.newTotalInterest !== undefined) {
                    changes.push({ label: 'Total Interest', format: 'currency', before: details.oldTotalInterest, after: details.newTotalInterest });
                } else if (details.newTotalInterest !== undefined) {
                    changes.push({ label: 'Total Interest', format: 'currency', before: null, after: details.newTotalInterest });
                }
                if (details.oldTotalInitiationFee !== undefined && details.newTotalInitiationFee !== undefined) {
                    changes.push({ label: 'Total Initiation Fee', format: 'currency', before: details.oldTotalInitiationFee, after: details.newTotalInitiationFee });
                }
            } else if (details.adjustmentType === 'add_amount') {
                if (details.amount !== undefined) {
                    changes.push({ label: 'Amount Added', format: 'currency', before: null, after: details.amount });
                }
                if (details.oldPrincipal !== undefined && details.newPrincipal !== undefined) {
                    changes.push({ label: 'Principal', format: 'currency', before: details.oldPrincipal, after: details.newPrincipal });
                }
                if (details.oldRemainingPrincipal !== undefined && details.newRemainingPrincipal !== undefined) {
                    changes.push({ label: 'Remaining Principal', format: 'currency', before: details.oldRemainingPrincipal, after: details.newRemainingPrincipal });
                }
                if (details.oldTotalInterest !== undefined && details.newTotalInterest !== undefined) {
                    changes.push({ label: 'Total Interest', format: 'currency', before: details.oldTotalInterest, after: details.newTotalInterest });
                }
                if (details.additionalInitiationFee !== undefined) {
                    changes.push({ label: 'Additional Initiation Fee', format: 'currency', before: null, after: details.additionalInitiationFee });
                }
                if (details.oldMonthlyPayment !== undefined && details.newMonthlyPayment !== undefined) {
                    changes.push({ label: 'Monthly Payment', format: 'currency', before: details.oldMonthlyPayment, after: details.newMonthlyPayment });
                }
            }

            return changes;
        }

        /**
         * Recalculate standard-loan remaining interest from OUTSTANDING balances.
         * This mirrors the calculator style:
         * - 30% income table on declining balance
         * - minus admin + initiation components
         * - interest calculated for interest period, then equalized across remaining months
         */
        function calculateStandardOutstandingInterest(remainingPrincipal, remainingMonths, remainingInitiationFee, adminFee = Calculations.RATES.ADMIN_FEE_STANDARD) {
            if (remainingMonths <= 0 || remainingPrincipal <= 0) return 0;

            const principalPerMonth = remainingPrincipal / remainingMonths;
            const initiationFeePerMonth = (remainingInitiationFee || 0) / remainingMonths;
            const interestMonths = Calculations.calculateInterestPeriod(remainingMonths).interestMonths;

            let balance = remainingPrincipal;
            let totalInterestForPeriod = 0;

            for (let month = 1; month <= interestMonths; month++) {
                const tbfsIncome = balance * Calculations.RATES.INCOME_TABLE_RATE;
                const monthInterest = Math.max(0, tbfsIncome - adminFee - initiationFeePerMonth);
                totalInterestForPeriod += monthInterest;
                balance = Math.max(0, balance - principalPerMonth);
            }

            return totalInterestForPeriod;
        }

        /**
         * Build calculator-style monthly repayment components from outstanding balances.
         */
        function buildOutstandingRepaymentBreakdown({ remainingPrincipal, remainingInterest, remainingInitiationFee, remainingMonths, adminFee }) {
            const safeMonths = Math.max(1, Number(remainingMonths || 0));
            const safePrincipal = Number(remainingPrincipal || 0);
            const safeInterest = Number(remainingInterest || 0);
            const safeInitiation = Number(remainingInitiationFee || 0);
            const safeAdmin = Number(adminFee || 0);

            const principalPerMonthRaw = safePrincipal / safeMonths;
            const interestPerMonthRaw = safeInterest / safeMonths;
            const initiationFeePerMonthRaw = safeInitiation / safeMonths;
            const monthlyPaymentRaw = principalPerMonthRaw + interestPerMonthRaw + initiationFeePerMonthRaw + safeAdmin;
            const totalRepaymentRaw = monthlyPaymentRaw * safeMonths;

            return {
                principalPerMonthRaw,
                interestPerMonthRaw,
                initiationFeePerMonthRaw,
                adminFeePerMonthRaw: safeAdmin,
                monthlyPaymentRaw,
                totalRepaymentRaw,

                // Rounded values for UI / statement readability
                principalPerMonth: Calculations.round(principalPerMonthRaw),
                interestPerMonth: Calculations.round(interestPerMonthRaw),
                initiationFeePerMonth: Calculations.round(initiationFeePerMonthRaw),
                adminFeePerMonth: Calculations.round(safeAdmin),
                monthlyPayment: Calculations.round(monthlyPaymentRaw),
                totalRepayment: Calculations.round(totalRepaymentRaw)
            };
        }

        /**
         * Recalculate stockvel repayment from outstanding balances using the same
         * month-level logic as calculator.html (tiered interest + dynamic admin fee),
         * then equalize monthly installments across the remaining term.
         */
        function calculateStockvelOutstandingRepaymentPlan({
            remainingPrincipal,
            remainingMonths,
            remainingInitiationFee,
            startingContributions,
            monthlyContribution
        }) {
            const months = Math.max(1, Number(remainingMonths || 0));
            const principal = Number(remainingPrincipal || 0);
            const initiationBalance = Number(remainingInitiationFee || 0);
            const contributionBase = Number(startingContributions || 0);
            const contributionPerMonth = Number(monthlyContribution || 0);

            if (principal <= 0) {
                return {
                    breakdown: [],
                    totalInterestRaw: 0,
                    totalAdminRaw: 0,
                    equalMonthlyPaymentRaw: 0,
                    averageAdminFeeRaw: 0,
                    averageInterestRaw: 0,
                    minAdminRaw: 0,
                    maxAdminRaw: 0,
                    minInterestRaw: 0,
                    maxInterestRaw: 0
                };
            }

            const principalPerMonth = principal / months;
            const initiationFeePerMonth = initiationBalance / months;

            let outstandingBalance = principal;
            let currentSavings = contributionBase;
            const monthlyDetails = [];

            for (let month = 1; month <= months; month++) {
                if (month > 1) {
                    currentSavings += contributionPerMonth;
                }

                const tieredResult = Calculations.calculateTieredStockvelInterest(outstandingBalance, currentSavings);

                let interestPayment = 0;
                if (tieredResult && tieredResult.tiers1to4Interest !== undefined) {
                    const tieredInterest = tieredResult.tiers1to4Interest * (principal / Math.max(outstandingBalance, 0.01));
                    const minimumInterest = principalPerMonth * Calculations.RATES.STOCKVEL_MIN_MONTHLY_RATE;
                    interestPayment = Math.max(tieredInterest, minimumInterest);
                } else {
                    interestPayment = principalPerMonth * Calculations.RATES.STOCKVEL_MIN_MONTHLY_RATE;
                }

                let adminPayment = Calculations.RATES.ADMIN_FEE_STANDARD;
                if (tieredResult && tieredResult.tier1to4Amount > 0) {
                    const effectiveRate = tieredResult.tiers1to4Interest / tieredResult.tier1to4Amount;
                    adminPayment = Calculations.RATES.ADMIN_FEE_STANDARD * (1 - effectiveRate);
                }
                adminPayment = Math.max(0, adminPayment);

                monthlyDetails.push({
                    principal_payment: principalPerMonth,
                    interest_payment: interestPayment,
                    initiation_fee: initiationFeePerMonth,
                    admin_fee: adminPayment
                });

                outstandingBalance = Math.max(0, outstandingBalance - principalPerMonth);
            }

            const totalCostRaw = monthlyDetails.reduce((sum, item) =>
                sum +
                (item.principal_payment || 0) +
                (item.interest_payment || 0) +
                (item.initiation_fee || 0) +
                (item.admin_fee || 0)
            , 0);
            const equalMonthlyPaymentRaw = totalCostRaw / months;

            let balanceTracker = principal;
            const breakdown = monthlyDetails.map((item) => {
                const nextOutstanding = Math.max(0, balanceTracker - (item.principal_payment || 0));
                const row = {
                    monthly_payment: equalMonthlyPaymentRaw,
                    principal_payment: item.principal_payment || 0,
                    interest_payment: item.interest_payment || 0,
                    initiation_fee: item.initiation_fee || 0,
                    admin_fee: item.admin_fee || 0,
                    outstanding_balance: nextOutstanding
                };
                balanceTracker = nextOutstanding;
                return row;
            });

            const interestSeries = monthlyDetails.map(item => item.interest_payment || 0);
            const adminSeries = monthlyDetails.map(item => item.admin_fee || 0);
            const totalInterestRaw = interestSeries.reduce((sum, val) => sum + val, 0);
            const totalAdminRaw = adminSeries.reduce((sum, val) => sum + val, 0);

            return {
                breakdown,
                totalInterestRaw,
                totalAdminRaw,
                equalMonthlyPaymentRaw,
                averageAdminFeeRaw: totalAdminRaw / months,
                averageInterestRaw: totalInterestRaw / months,
                minAdminRaw: Math.min(...adminSeries),
                maxAdminRaw: Math.max(...adminSeries),
                minInterestRaw: Math.min(...interestSeries),
                maxInterestRaw: Math.max(...interestSeries)
            };
        }

        /**
         * Persist a loan adjustment event in:
         * - loan.adjustment_history (loan-local, best for statements)
         * - AppState.transactions (legacy history merged in at load)
         * - AppState.transactions (AppStateManager/backup)
         */
        function logLoanAdjustment(loan, { adjustmentType, reason, beforeSnapshot, afterSnapshot, meta = {} }) {
            const timestamp = new Date().toISOString();
            const id = Date.now();
            const changes = diffLoanAdjustmentSnapshots(beforeSnapshot, afterSnapshot);

            const event = {
                id,
                timestamp,
                adjustmentType,
                reason: reason || '',
                before: beforeSnapshot,
                after: afterSnapshot,
                changes,
                meta
            };

            // Loan-local history (preferred for statement rendering)
            if (!Array.isArray(loan.adjustment_history)) loan.adjustment_history = [];
            loan.adjustment_history.push(event);

            // Global transaction log (canonical field — F-09)
            if (!Array.isArray(AppState.transactions)) AppState.transactions = [];
            AppState.transactions.push({
                id,
                type: 'loan_adjustment',
                description: 'Loan adjustment \u2014 ' + loan.client_name + ' (Loan #' + loan.loan_id + ')',
                timestamp,
                details: {
                    id,
                    loanId: loan.loan_id,
                    clientName: loan.client_name,
                    adjustmentType,
                    reason: reason || '',
                    before: beforeSnapshot,
                    after: afterSnapshot,
                    changes,
                    ...meta
                }
            });

            // AppStateManager "transactions" (used by settings backup and some pages)
            if (!Array.isArray(AppState.transactions)) AppState.transactions = [];
            AppState.transactions.push({
                id,
                type: 'loan_adjustment',
                date: timestamp,
                description: `Loan #${loan.loan_id} adjusted (${humanizeAdjustmentType(adjustmentType)})`,
                data: {
                    loanId: loan.loan_id,
                    clientName: loan.client_name,
                    adjustmentType,
                    reason: reason || '',
                    before: beforeSnapshot,
                    after: afterSnapshot,
                    changes,
                    ...meta
                }
            });

            return event;
        }

        function getLoanAdjustmentEvents(loan) {
            const loanId = loan.loan_id;
            const events = [];

            // 1) Preferred: loan-local adjustment history
            (Array.isArray(loan.adjustment_history) ? loan.adjustment_history : []).forEach(e => {
                if (!e) return;
                events.push({
                    id: e.id,
                    timestamp: e.timestamp,
                    adjustmentType: e.adjustmentType,
                    reason: e.reason || '',
                    changes: Array.isArray(e.changes) ? e.changes : [],
                    meta: e.meta || {}
                });
            });

            // 2) Global log — adjustment events recorded before loan-local
            // history existed (legacy records were merged in at load time).
            (Array.isArray(AppState.transactions) ? AppState.transactions : []).forEach(tx => {
                if (!tx || tx.type !== 'loan_adjustment') return;
                const details = tx.details || {};
                if (details.loanId !== loanId) return;
                const txId = tx.id || details.id;
                if (txId && events.some(e2 => e2.id === txId)) return; // already in loan-local history

                events.push({
                    id: tx.id || details.id,
                    timestamp: tx.timestamp,
                    adjustmentType: details.adjustmentType,
                    reason: details.reason || '',
                    changes: Array.isArray(details.changes) ? details.changes : buildChangesFromLegacyAdjustmentDetails(details),
                    meta: details
                });
            });

            // 3) AppStateManager transactions
            (Array.isArray(AppState.transactions) ? AppState.transactions : []).forEach(tx => {
                if (!tx || tx.type !== 'loan_adjustment') return;
                const data = tx.data || {};
                if (data.loanId !== loanId) return;

                events.push({
                    id: tx.id,
                    timestamp: tx.date,
                    adjustmentType: data.adjustmentType,
                    reason: data.reason || '',
                    changes: Array.isArray(data.changes) ? data.changes : buildChangesFromLegacyAdjustmentDetails(data),
                    meta: data
                });
            });

            // Deduplicate (best-effort)
            const seen = new Set();
            const unique = [];
            events.forEach(ev => {
                const key = ev.id ? `id:${ev.id}` : `k:${ev.timestamp}|${ev.adjustmentType}|${ev.reason || ''}`;
                if (seen.has(key)) return;
                seen.add(key);
                unique.push(ev);
            });

            unique.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            return unique;
        }
        
        /**
         * Download loan statement as PDF
         * 
         * Generates a comprehensive PDF statement for a loan including:
         * - Loan summary and current status
         * - Financial breakdown (principal, interest, fees)
         * - Complete payment history
         * - Interest recalculation details (if applicable)
         * - Early payoff information (if applicable)
         * 
         * The PDF is optimized for printing and mobile viewing
         * 
         * @param {number} loanId - The ID of the loan to generate statement for
         */
        function downloadLoanStatementPDF(loanId) {
            // STEP 1: VALIDATION - Find loan
            const loan = allLoans.find(l => l.loan_id === loanId);
            if (!loan) {
                alert('❌ Loan not found!');
                return;
            }
            
            try {
                // STEP 2: INITIALIZE PDF DOCUMENT
                // Create new PDF document using jsPDF library
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // Page settings
                const pageWidth = doc.internal.pageSize.width;
                const pageHeight = doc.internal.pageSize.height;
                const margin = 20;
                const contentWidth = pageWidth - (2 * margin);
                let yPos = 20;
                
                // Helper function to check if we need a new page
                function checkPageBreak(neededSpace) {
                    if (yPos + neededSpace > pageHeight - 20) {
                        doc.addPage();
                        yPos = 20;
                        return true;
                    }
                    return false;
                }
                
                // Helper function to add text with word wrap
                function addText(text, x, y, options = {}) {
                    const fontSize = options.fontSize || 10;
                    const maxWidth = options.maxWidth || contentWidth;
                    const align = options.align || 'left';
                    
                    doc.setFontSize(fontSize);
                    if (options.bold) doc.setFont('helvetica', 'bold');
                    else doc.setFont('helvetica', 'normal');
                    
                    const lines = doc.splitTextToSize(text, maxWidth);
                    lines.forEach((line, index) => {
                        checkPageBreak(fontSize * 0.5);
                        doc.text(line, x, y + (index * fontSize * 0.5), { align: align });
                    });
                    
                    return y + (lines.length * fontSize * 0.5);
                }

                // Helper: wrap text while respecting explicit newlines
                function writeWrappedLines(text, x, maxWidth, lineHeight) {
                    if (text === null || text === undefined) return;
                    const blocks = String(text).split(/\r?\n/);
                    blocks.forEach((block, idx) => {
                        const lines = doc.splitTextToSize(block, maxWidth);
                        lines.forEach(line => {
                            checkPageBreak(lineHeight + 2);
                            doc.text(line, x, yPos);
                            yPos += lineHeight;
                        });
                        // Small gap between newline-separated blocks
                        if (idx < blocks.length - 1) yPos += 1;
                    });
                }
                
                // ============================================
                // HEADER
                // ============================================
                doc.setFillColor(41, 128, 185);
                doc.rect(0, 0, pageWidth, 40, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(22);
                doc.setFont('helvetica', 'bold');
                doc.text('TBFS LOAN STATEMENT', pageWidth / 2, 18, { align: 'center' });
                
                doc.setFontSize(12);
                doc.setFont('helvetica', 'normal');
                doc.text(`Loan #${loan.loan_id} - ${loan.client_name}`, pageWidth / 2, 30, { align: 'center' });
                
                doc.setTextColor(0, 0, 0);
                yPos = 50;
                
                // ============================================
                // LOAN SUMMARY
                // ============================================
                checkPageBreak(40);
                doc.setFillColor(236, 240, 241);
                doc.rect(margin, yPos, contentWidth, 8, 'F');
                doc.setFontSize(14);
                doc.setFont('helvetica', 'bold');

                });
                
                yPos += 5;
                
                // ============================================

                // ============================================
